<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master LJK V5.7 - Ultra Polished</title>
    <style>
        @media print {
            @page { size: A4 landscape; margin: 0; }
            body { background-color: white !important; margin: 0; padding: 0 !important; }
            .kertas { box-shadow: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        body { background-color: #555; display: flex; justify-content: center; padding: 20px; font-family: Arial, sans-serif; }
        
        /* 🚨 GEMBOK KERTAS MUTLAK A4 🚨 */
        .kertas { 
            width: 297mm; min-width: 297mm; max-width: 297mm; 
            height: 210mm; min-height: 210mm; max-height: 210mm; 
            background-color: white; box-sizing: border-box; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5); display: flex; overflow: hidden;
        }
        
        /* 🚨 AREA 50:50 🚨 */
        .area-mesin { 
            flex: 0 0 50%; width: 50%; min-width: 50%; max-width: 50%; 
            box-sizing: border-box; position: relative; 
            padding: 60px 20px 48px 20px; border-right: 2px dashed #999; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        .area-manusia { 
            flex: 0 0 50%; width: 50%; min-width: 50%; max-width: 50%; 
            box-sizing: border-box; padding: 30px 25px; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* ================== STYLING AREA MESIN ================== */
        .penanda { width: 30px; height: 30px; background-color: black; position: absolute; }
        .kiri-atas { top: 20px; left: 15px; } .kanan-atas { top: 20px; right: 15px; } 
        .kiri-bawah { bottom: 20px; left: 15px; } .kanan-bawah { bottom: 20px; right: 15px; }
        .penanda-orientasi { width: 30px; height: 10px; background-color: black; position: absolute; top: 60px; left: 15px; }

        .mesin-wrapper { display: flex; flex-direction: column; height: 100%; justify-content: flex-end; }

        .petunjuk-box { text-align: center; margin-bottom: 18px; }
        .petunjuk-title { font-size: 13.5px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .petunjuk-icon { display: flex; justify-content: center; gap: 18px; font-size: 10.5px; font-weight: bold; }
        .petunjuk-item { display: flex; align-items: center; gap: 5px; }

        .pg-wrapper { width: max-content; margin: 0 auto; display: flex; flex-direction: column; align-items: center; margin-bottom: 5px; }
        .pg-title { width: 100%; box-sizing: border-box; font-size: 11.5px; font-weight: bold; margin-bottom: 12px; background: #eee; padding: 6px; text-align: center; border: 1px solid #ccc; letter-spacing: 1px;}

        /* SENTER GAP 20PX */
        .mesin-body { display: flex; justify-content: center; gap: 20px; } 
        .kolom-mesin { display: flex; flex-direction: column; width: max-content; }
        
        .row-grid { height: 23px; display: flex; align-items: center; } 
        
        .nomor { width: 22px; text-align: right; margin-right: 8px; font-size: 11px; font-weight: bold; }
        .opsi-group { display: flex; gap: 7px; } 
        
        .opsi { width: 16px; height: 16px; border: 1px solid #aaa; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 9px; color: #999; box-sizing: border-box; font-weight: 600;}
        .id-box { width: 16px; height: 16px; border: 1.5px solid black; box-sizing: border-box; }
        
        .contoh-benar { background-color: black !important; color: black !important; border-color: black !important; }
        .contoh-silang { position: relative; color: transparent !important; border-color: black !important; }
        .contoh-silang::after { content: 'X'; position: absolute; color: black; font-size: 14px; font-weight: bold;}
        .contoh-centang { position: relative; color: transparent !important; border-color: black !important; }
        .contoh-centang::after { content: '✓'; position: absolute; color: black; font-size: 12px; font-weight: bold;}

        /* ================== STYLING AREA MANUSIA ================== */
        .kop-surat { display: flex; align-items: center; border-bottom: 3px solid black; padding-bottom: 10px; margin-bottom: 20px; }
        .kop-logo { width: 14mm; height: 14mm; object-fit: contain; margin-right: 15px; flex-shrink: 0; }
        .kop-teks { flex-grow: 1; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        
        .kop-teks h3 { margin: 0; font-size: 8.5pt; font-weight: bold; text-transform: uppercase; color: #444;}
        .kop-teks h4 { margin: 3px 0; font-size: 7.5pt; font-weight: bold; text-transform: uppercase; color: #555;}
        .kop-teks h1 { margin: 3px 0; font-size: 10.5pt; font-weight: 900; text-transform: uppercase; color: #000;}
        .kop-teks p { margin: 0; font-size: 8pt; color: #222; }

        .identitas-box { border: 2px solid black; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #fafafa;}
        .identitas-baris { display: flex; font-size: 12px; font-weight: bold; margin-bottom: 15px; align-items: flex-end;}
        .identitas-baris:last-child { margin-bottom: 0; }
        .identitas-label { width: 55px; } 
        .garis { border-bottom: 1px dashed black; flex-grow: 1; margin-left: 8px; height: 16px; position: relative;}

        .uraian-title { font-size: 12px; font-weight: bold; margin-bottom: 12px; background: #eee; padding: 8px; text-align: center; border: 1px solid #ccc; letter-spacing: 1px;}
        .uraian-container { display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .garis-uraian { border-bottom: 1px solid #888; height: 26px; width: 100%; position: relative;}
    </style>
</head>
<body>
    <div class="kertas">
        
        <div class="area-mesin">
            <div class="penanda kiri-atas"></div>
            <div class="penanda-orientasi"></div>
            <div class="penanda kanan-atas"></div>
            <div class="penanda kiri-bawah"></div>
            <div class="penanda kanan-bawah"></div>

            <div class="mesin-wrapper">
                
                <div>
                    <div class="petunjuk-box">
                        <div class="petunjuk-title">LEMBAR JAWABAN KOMPUTER</div>
                        <div class="petunjuk-icon">
                            <div class="petunjuk-item">BENAR: <div class="opsi contoh-benar">A</div></div>
                            <div class="petunjuk-item">SALAH: <div class="opsi contoh-silang" style="width:16px; height:16px;">B</div></div>
                            <div class="petunjuk-item">SALAH: <div class="opsi contoh-centang" style="width:16px; height:16px;">C</div></div>
                        </div>
                    </div>
                </div>

                <div class="pg-wrapper">
                    <div class="pg-title">JAWABAN PILIHAN GANDA</div>

                    <div class="mesin-body">
                        <div class="kolom-mesin" id="wadahSoal1"></div>

                        <div class="kolom-mesin" id="wadahSoal2"></div>

                        <div class="kolom-mesin" id="wadahSoal3"></div>
                    </div>
                </div>

            </div>
        </div>

        <div class="area-manusia">
            
            <div class="kop-surat">
                <img id="cetakLogo1" class="kop-logo" src="logo1.png" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" style="display:block;">
                <div style="display:none; width: 14mm; height: 14mm; background-color: transparent; border: 1px solid #999; justify-content:center; align-items:center; font-size:10px; flex-shrink: 0; margin-right:15px;">LOGO</div>
                
                <div class="kop-teks">
                    <h3 id="cetakBaris1"></h3>
                    <h4 id="cetakBaris2"></h4>
                    <h1 id="cetakBaris3"></h1>
                    <p id="cetakBaris4"></p>
                </div>
            </div>

            <div class="identitas-box">
                <div class="identitas-baris">
                    <div class="identitas-label">NAMA</div><span>:</span><div class="garis"></div>
                </div>
                <div class="identitas-baris" style="margin-bottom: 0;">
                    <div style="display: flex; flex: 1; align-items: flex-end;">
                        <div class="identitas-label">KELAS</div><span>:</span><div class="garis"></div>
                    </div>
                    <div style="display: flex; flex: 1.2; align-items: flex-end; margin-left: 20px;">
                        <div style="width: 50px; font-weight: bold; font-size: 12px;">MAPEL</div><span>:</span><div class="garis"></div>
                    </div>
                </div>
            </div>

            <div class="uraian-title">JAWABAN URAIAN</div>
            <div class="uraian-container" id="wadahUraian"></div>

        </div>
    </div>

    <script>
        // =========================================================
        let b1 = localStorage.getItem('kopBaris1') || 'PENILAIAN AKHIR TAHUN SEMESTER GENAP';
        let b2 = localStorage.getItem('kopBaris2') || 'TAHUN AJARAN 2025/2026';
        let b3 = localStorage.getItem('kopBaris3') || 'PONDOK PESANTREN HUSNUL KHOTIMAH';
        let b4 = localStorage.getItem('kopBaris4') || 'Jl. Raya Manis Kidul Kec. Jalaksana Kab. Kuningan Prov. Jawa Barat';
        let l1 = localStorage.getItem('logo1') || 'logo1.png';

        document.getElementById('cetakBaris1').innerText = b1;
        document.getElementById('cetakBaris2').innerText = b2;
        document.getElementById('cetakBaris3').innerText = b3;
        document.getElementById('cetakBaris4').innerText = b4;
        
        let elLogo = document.getElementById('cetakLogo1');
        if(l1 && elLogo) { elLogo.src = l1; elLogo.style.display = 'block'; }

        // =========================================================
        // 2 & 3. GENERATE GRID (NO PESERTA, NO SOAL, & BULATAN)
        // =========================================================
        let abjad = ['A','B','C','D','E'];

        // --- KOLOM 1: ID Peserta + Soal 1-10 ---
        let htmlCol1 = '<div style="position:relative; z-index:2;">';
        
        // Row 0: Title ID (Sejajar dengan No. 11)
        htmlCol1 += '<div class="row-grid" style="padding-left: 30px; justify-content: center; align-items: flex-end; padding-bottom:2px;"><span style="font-size:10.5px; font-weight:bold; letter-spacing:0.5px;">NO. PESERTA</span></div>';
        
        // Row 1: Gap Spacer
        htmlCol1 += '<div class="row-grid"></div>';
        
        // Row 2: Empty Box (Diangkat secara visual sejauh 8px agar duduk persis di tengah)
        htmlCol1 += '<div class="row-grid"><div class="nomor"></div><div class="opsi-group" style="transform: translateY(-8px);">';
        for(let j=0; j<5; j++) htmlCol1 += '<div class="id-box"></div>';
        htmlCol1 += '</div></div>';

        // Row 3 s/d 12: Digit 0 - 9
        for(let digit=0; digit<=9; digit++){
            htmlCol1 += '<div class="row-grid"><div class="nomor"></div><div class="opsi-group">';
            for(let col=0; col<5; col++){ htmlCol1 += `<div class="opsi">${digit}</div>`; }
            htmlCol1 += '</div></div>';
        }
        
        // Row 13: Gap Spacer
        htmlCol1 += '<div class="row-grid"></div>'; 

        // Row 14: Title NO. SOAL (Diangkat 11px ke atas agar pas di tengah-tengah ruang kosong)
        htmlCol1 += '<div class="row-grid" style="padding-left: 30px; justify-content: center; align-items: center; transform: translateY(-11px);"><span style="font-size:10.5px; font-weight:bold; letter-spacing:0.5px;">NO. SOAL</span></div>';

        // Row 15 s/d 24: Soal 1 - 10
        for(let i=1; i<=10; i++){
            htmlCol1 += `<div class="row-grid"><div class="nomor">${i}.</div><div class="opsi-group">`;
            for(let j=0; j<5; j++){ htmlCol1 += `<div class="opsi">${abjad[j]}</div>`; }
            htmlCol1 += `</div></div>`;
        }
        htmlCol1 += '</div>';
        document.getElementById('wadahSoal1').innerHTML = htmlCol1;

        // --- KOLOM 2: Soal 11-35 ---
        let htmlCol2 = '';
        for(let i=11; i<=35; i++){
            htmlCol2 += `<div class="row-grid"><div class="nomor">${i}.</div><div class="opsi-group">`;
            for(let j=0; j<5; j++) htmlCol2 += `<div class="opsi">${abjad[j]}</div>`;
            htmlCol2 += `</div></div>`;
        }
        document.getElementById('wadahSoal2').innerHTML = htmlCol2;

        // --- KOLOM 3: Soal 36-60 ---
        let htmlCol3 = '';
        for(let i=36; i<=60; i++){
            htmlCol3 += `<div class="row-grid"><div class="nomor">${i}.</div><div class="opsi-group">`;
            for(let j=0; j<5; j++) htmlCol3 += `<div class="opsi">${abjad[j]}</div>`;
            htmlCol3 += `</div></div>`;
        }
        document.getElementById('wadahSoal3').innerHTML = htmlCol3;

        // =========================================================
        // 4. GARIS URAIAN
        // =========================================================
        const wadahUraian = document.getElementById('wadahUraian');
        let htmlUraian = ''; 
        for (let i = 1; i <= 21; i++) { htmlUraian += '<div class="garis-uraian"></div>'; }
        wadahUraian.innerHTML = htmlUraian;

        // =========================================================
        window.onload = function() { setTimeout(function() { window.print(); }, 800); };
    </script>
</body>
</html>
